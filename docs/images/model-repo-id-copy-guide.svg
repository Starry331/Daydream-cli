<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="620" viewBox="0 0 1600 620" role="img" aria-labelledby="title desc">
  <title id="title">How to copy the Hugging Face model repo ID</title>
  <desc id="desc">A Hugging Face model page with the repo name mlx-community/Qwen3.5-9B-MLX-4bit highlighted. A copy icon next to the model name is circled, with an arrow and label telling the user to copy the model name for the Model field.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fcfcfd"/>
      <stop offset="100%" stop-color="#f4f5f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#111111"/>
    </marker>
  </defs>

  <rect width="1600" height="620" fill="url(#bg)"/>
  <rect x="32" y="32" width="1536" height="556" rx="28" fill="#ffffff" filter="url(#shadow)"/>

  <rect x="32" y="32" width="1536" height="88" rx="28" fill="#ffffff"/>
  <text x="84" y="82" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#111111">Hugging Face</text>
  <rect x="268" y="46" width="500" height="50" rx="18" fill="#f5f6f8" stroke="#d7dbe3"/>
  <text x="308" y="79" font-family="Inter, Arial, sans-serif" font-size="18" fill="#8b94a7">Search models, datasets, users...</text>
  <text x="960" y="82" font-family="Inter, Arial, sans-serif" font-size="18" fill="#111111">Models</text>
  <text x="1070" y="82" font-family="Inter, Arial, sans-serif" font-size="18" fill="#111111">Datasets</text>
  <text x="1220" y="82" font-family="Inter, Arial, sans-serif" font-size="18" fill="#111111">Spaces</text>
  <text x="1350" y="82" font-family="Inter, Arial, sans-serif" font-size="18" fill="#111111">Docs</text>

  <text x="74" y="186" font-family="Inter, Arial, sans-serif" font-size="22" fill="#9aa3b2">mlx-community/</text>
  <text x="284" y="186" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#111111">Qwen3.5-9B-MLX-4bit</text>

  <circle cx="584" cy="170" r="23" fill="#ffffff" stroke="#111111" stroke-width="4"/>
  <rect x="575" y="160" width="13" height="17" rx="2" fill="none" stroke="#111111" stroke-width="3"/>
  <rect x="568" y="154" width="13" height="17" rx="2" fill="none" stroke="#111111" stroke-width="3"/>

  <rect x="560" y="122" width="228" height="34" rx="17" fill="#ffffff" stroke="#d7dbe3"/>
  <text x="590" y="145" font-family="Inter, Arial, sans-serif" font-size="17" fill="#111111">copy this model name</text>

  <path d="M700 222 C720 258, 742 282, 782 318" fill="none" stroke="#111111" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="804" y="336" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#111111">Paste this repo ID into the Model field</text>

  <g font-family="Inter, Arial, sans-serif" font-size="18" fill="#445066">
    <rect x="74" y="214" width="168" height="42" rx="16" fill="#fff3e8" stroke="#f3d1ad"/>
    <text x="108" y="241">Image-Text-to-Text</text>
    <rect x="256" y="214" width="88" height="42" rx="16" fill="#f7f8fb" stroke="#d7dbe3"/>
    <text x="286" y="241">MLX</text>
    <rect x="356" y="214" width="128" height="42" rx="16" fill="#f7f8fb" stroke="#d7dbe3"/>
    <text x="388" y="241">Safetensors</text>
    <rect x="498" y="214" width="98" height="42" rx="16" fill="#f7f8fb" stroke="#d7dbe3"/>
    <text x="524" y="241">qwen3_5</text>
    <rect x="610" y="214" width="96" height="42" rx="16" fill="#f7f8fb" stroke="#d7dbe3"/>
    <text x="639" y="241">qwen3.5</text>
    <rect x="720" y="214" width="236" height="42" rx="16" fill="#f7f8fb" stroke="#d7dbe3"/>
    <text x="756" y="241">vision-language-model</text>
    <rect x="970" y="214" width="132" height="42" rx="16" fill="#f7f8fb" stroke="#d7dbe3"/>
    <text x="1006" y="241">quantized</text>
    <rect x="1116" y="214" width="72" height="42" rx="16" fill="#f7f8fb" stroke="#d7dbe3"/>
    <text x="1142" y="241">4bit</text>
  </g>

  <g font-family="Inter, Arial, sans-serif" fill="#111111">
    <text x="74" y="334" font-size="20" font-weight="700">Model card</text>
    <text x="236" y="334" font-size="20" fill="#606a7b">Files and versions</text>
    <text x="452" y="334" font-size="20" fill="#606a7b">Community</text>
    <line x1="64" y1="348" x2="215" y2="348" stroke="#111111" stroke-width="4" stroke-linecap="round"/>
  </g>

  <rect x="74" y="390" width="862" height="152" rx="20" fill="#fafbfc" stroke="#eceff4"/>
  <text x="104" y="448" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" fill="#111111">Qwen3.5-9B-MLX-4bit</text>
  <text x="104" y="504" font-family="Inter, Arial, sans-serif" font-size="18" fill="#4e5969">This is a quantized MLX version of Qwen/Qwen3.5-9B for Apple Silicon.</text>

  <rect x="980" y="390" width="544" height="152" rx="20" fill="#fafbfc" stroke="#eceff4"/>
  <text x="1016" y="442" font-family="Inter, Arial, sans-serif" font-size="18" fill="#606a7b">Downloads last month</text>
  <text x="1016" y="484" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#111111">77,750</text>
  <path d="M1350 482 C1388 448, 1420 518, 1450 454 S1510 462, 1542 430" fill="none" stroke="#8f75f6" stroke-width="8" stroke-linecap="round"/>

  <rect x="1018" y="92" width="260" height="52" rx="20" fill="#fff8ef" stroke="#ffd7ad"/>
  <text x="1048" y="126" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#8a4b00">Use the copied repo ID as the model name</text>
</svg>
